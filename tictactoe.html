<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 { font-size: 2.5rem; margin-bottom: 1rem; letter-spacing: 2px; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; }
    .cell.x { color: #e94560; }
    .cell.o { color: #a0c4ff; }
    .cell.win { background: #0f3460; outline: 3px solid #ffd166; }

    #restart {
      margin-top: 1.8rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s;
    }

    #restart:hover { background: #c73652; }

    #score {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box span { display: block; font-size: 1.8rem; font-weight: bold; }
    .score-x span { color: #e94560; }
    .score-o span { color: #a0c4ff; }
    .score-tie span { color: #ffd166; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>

<div id="score">
  <div class="score-box score-x">X <span id="score-x">0</span></div>
  <div class="score-box score-tie">Tie <span id="score-tie">0</span></div>
  <div class="score-box score-o">O <span id="score-o">0</span></div>
</div>

<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<button id="restart">Restart</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const scores = { X: 0, O: 0, Tie: 0 };
  let board, current, over;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    over = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = "Player X's turn";
  }

  function checkWin() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return [a, b, c];
      }
    }
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(idx => cells[idx].classList.add('win'));
        status.textContent = `Player ${current} wins!`;
        scores[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a tie!";
        scores.Tie++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    });
  });

  function updateScore() {
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-tie').textContent = scores.Tie;
  }

  document.getElementById('restart').addEventListener('click', init);

  init();
</script>
</body>
</html>
